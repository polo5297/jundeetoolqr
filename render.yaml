services:
  - type: web
    name: tool-qr-register
    env: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: ADMIN_PIN
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: FOREMAN_EMAILS
        sync: false
      - key: SITE_NAME
        value: Jundee
      - key: DATA_FILE
        value: /var/data/tool-register.json
    disk:
      name: tool-register-data
      mountPath: /var/data
      sizeGB: 1
